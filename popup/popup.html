<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResellKit Bot</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="terminal">
    <div class="terminal-header">
      <span class="terminal-title">RESELLKIT BOT v3.0</span>
      <button id="closeBtn" class="close-btn">×</button>
    </div>

    <div class="terminal-body">
      <!-- STATUS -->
      <div class="section">
        <div class="section-title">> BOT STATUS</div>
        <div class="status-grid">
          <div class="status-item">
            <span class="label">State:</span>
            <span id="botStatus" class="value status-off">OFFLINE</span>
          </div>
          <div class="status-item">
            <span class="label">Checks:</span>
            <span id="checksCount" class="value">0</span>
          </div>
          <div class="status-item">
            <span class="label">Alerts:</span>
            <span id="alertsCount" class="value">0</span>
          </div>
          <div class="status-item">
            <span class="label">Errors:</span>
            <span id="errorsCount" class="value">0</span>
          </div>
        </div>
      </div>

      <!-- CONTROLS -->
      <div class="section">
        <div class="section-title">> CONTROLS</div>
        <div class="controls">
          <button id="startBtn" class="btn btn-start">START BOT</button>
          <button id="stopBtn" class="btn btn-stop" disabled>STOP BOT</button>
          <button id="forceCheckBtn" class="btn btn-action">FORCE CHECK</button>
        </div>
      </div>

      <!-- TARGETS -->
      <div class="section">
        <div class="section-title">> TARGETS (<span id="targetsCount">0</span>)</div>
        <button id="addTargetBtn" class="btn btn-add">+ ADD TARGET</button>
        <div id="targetsList" class="targets-list"></div>
      </div>

      <!-- LOGS -->
      <div class="section">
        <div class="section-title">> ACTIVITY LOG</div>
        <div id="logOutput" class="log-output"></div>
      </div>
    </div>
  </div>

  <!-- ADD TARGET MODAL -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span>ADD TARGET</span>
        <button id="modalClose" class="close-btn">×</button>
      </div>
      <form id="addForm">
        <input type="text" id="targetName" placeholder="Name (e.g. Nike Dunk Low)" required>
        <input type="url" id="targetUrl" placeholder="URL" required>
        <button type="submit" class="btn btn-start">ADD</button>
      </form>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
